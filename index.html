    <style>
      /* One-shot TOKA hero film. The existing hero remains the final frame. */
      .hero__film {
        position: absolute;
        inset: 0;
        z-index: 40;
        overflow: hidden;
        background: #050406;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0s linear 0.55s;
        pointer-events: none;
      }

      .hero__film.is-fading {
        opacity: 0;
        visibility: hidden;
      }

      .hero__film-video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: 50% 42%;
      }

      .hero__film::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(5, 4, 6, 0.02) 55%, rgba(5, 4, 6, 0.34));
      }

      .hero__film-mark {
        position: absolute;
        inset: 0;
        z-index: 1;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 5vw;
        color: #fff;
        background: rgba(5, 4, 6, 0.84);
        font: 900 clamp(70px, 17vw, 260px) / 0.78 "Anton", "Archivo Black", sans-serif;
        letter-spacing: -0.055em;
        text-align: center;
        text-shadow: 8px 8px 0 #ff19c8, -5px -5px 0 #7cff00;
        opacity: 0;
        transform: scale(0.3) rotate(-4deg);
        transition: none;
      }

      .hero__film.is-title .hero__film-mark {
        animation: toka-title-pop 0.48s cubic-bezier(0.16, 1.35, 0.3, 1) forwards;
      }

      @keyframes toka-title-pop {
        0% {
          opacity: 0;
          transform: scale(0.3) rotate(-4deg);
        }
        72% {
          opacity: 1;
          transform: scale(1.08) rotate(1deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0);
        }
      }

      .hero__film.is-ending .hero__film-mark {
        opacity: 1;
        transform: scale(1);
      }

      @media (min-width: 900px) {
        .hero__film-video {
          object-fit: contain;
          object-position: 50% 50%;
        }

        .hero__film {
          background:
            radial-gradient(circle at 50% 45%, rgba(255, 25, 200, 0.14), transparent 44%),
            #050406;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero__film {
          display: none;
        }
      }
    </style>

    <script>
      (() => {
        const film = document.querySelector("[data-hero-film]");
        const video = document.querySelector("[data-hero-film-video]");
        if (!film || !video) return;

        const TITLE_AT = 3.0;
        let finished = false;

        // Freeze on the video's final frame (with the TOKA WORLD title) and
        // keep it as the resting state. The static hero behind stays hidden.
        const freezeFilm = () => {
          if (finished) return;
          finished = true;
          film.classList.add("is-title", "is-ending");
          try {
            video.pause();
          } catch (err) {
            /* ignore */
          }
        };

        // Fallback only: if the video cannot play, reveal the hero underneath.
        const revealHero = () => {
          if (finished) return;
          finished = true;
          film.classList.add("is-fading");
          window.setTimeout(() => {
            video.pause();
            film.remove();
          }, 550);
        };

        video.addEventListener("timeupdate", () => {
          if (video.currentTime >= TITLE_AT) {
            film.classList.add("is-title");
          }
          const dur = video.duration;
          if (dur) {
            if (video.currentTime >= dur - 0.4) {
              film.classList.add("is-ending");
            }
            // Pause just before the true end so the last frame stays put
            // (avoids the iOS "ended" state that can flash a play button).
            if (video.currentTime >= dur - 0.05) {
              freezeFilm();
            }
          }
        });
        video.addEventListener("ended", freezeFilm);
        video.addEventListener("error", revealHero);

        const play = video.play();
        if (play && typeof play.catch === "function") {
          play.catch(revealHero);
        }
      })();
    </script>
